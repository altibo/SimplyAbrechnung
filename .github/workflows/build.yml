name: Anwendung bauen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SimplyAbrechnung-Windows
            packages: |
              dist/SimplyAbrechnung-Windows-Setup.exe
              dist/SimplyAbrechnung-Windows.zip
          - os: macos-latest
            artifact: SimplyAbrechnung-macOS
            packages: |
              dist/SimplyAbrechnung-macOS.pkg
              dist/SimplyAbrechnung-macOS.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Abhängigkeiten installieren
        run: python -m pip install -r requirements-dev.txt
      - name: Tests ausführen
        run: python -m pytest
      - name: Anwendung bauen
        run: pyinstaller --noconfirm --clean SimplyAbrechnung.spec
      - name: Windows-ZIP erstellen
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/SimplyAbrechnung.exe -DestinationPath dist/SimplyAbrechnung-Windows.zip -Force
      - name: Inno Setup installieren
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress --yes
      - name: Windows-Installer erstellen
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Select-String -Path pyproject.toml -Pattern '^version = "(.*)"$').Matches.Groups[1].Value
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer/SimplyAbrechnung.iss
      - name: macOS-Installer erstellen
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          pkgbuild \
            --component dist/SimplyAbrechnung.app \
            --identifier de.altibo.simplyabrechnung \
            --version "$VERSION" \
            --install-location /Applications \
            dist/SimplyAbrechnung-macOS.pkg
          pkgutil --payload-files dist/SimplyAbrechnung-macOS.pkg | grep -q 'SimplyAbrechnung.app'
      - name: macOS-ZIP erstellen
        if: runner.os == 'macOS'
        shell: bash
        run: ditto -c -k --keepParent dist/SimplyAbrechnung.app dist/SimplyAbrechnung-macOS.zip
      - name: Build-Artefakt bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.packages }}
          if-no-files-found: error

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4
      - name: Build-Artefakte laden
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Versionsnummer lesen
        id: version
        shell: bash
        run: echo "version=$(sed -n 's/^version = \"\(.*\)\"/\1/p' pyproject.toml)" >> "$GITHUB_OUTPUT"
      - name: GitHub-Vorabveröffentlichung erstellen
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: >-
          gh release create "v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          release/SimplyAbrechnung-Windows-Setup.exe
          release/SimplyAbrechnung-Windows.zip
          release/SimplyAbrechnung-macOS.pkg
          release/SimplyAbrechnung-macOS.zip
          --target "${GITHUB_SHA}"
          --title "SimplyAbrechnung ${VERSION} · Build ${GITHUB_RUN_NUMBER}"
          --notes "Installationspakete mit Upgrade-Unterstützung und ZIP-Pakete für Windows und macOS. Programmversion: ${VERSION}."
          --prerelease
